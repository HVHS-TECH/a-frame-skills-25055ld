<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
 
 
            <a-sphere color="white" 
                position="0 0 0" 
                animation="
                property:position;
                from: -90 45 -70;
                to: 90 45 -70;
                dur:20000;
                loop:true;
                "
        ></a-sphere>  
        
        <a-box color="green" 
        position="0 -4 -15" 
        scale="30 30"
        rotation="90 0 0"
        ></a-box>

<a-torus 
        position="0 0 -15"
        color="blue"
        radius=12
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="green"
        radius=11
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="yellow"
        radius=10
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="red"
        radius=9
        radius-tubular="0.25"
  

        </a-scene>
    </body>
</html>
