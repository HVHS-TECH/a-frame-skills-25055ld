<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
 
 
            <a-cone color="white" radius-bottom=".5" radius-top="3"
                position="0 2 -15" height="3"
                animation="
                property: rotation;
                from: 0 0 90;
                to: 0 180 90;
                loop: true;
                dir: alternate;
                "
        ></a-cone>  
        
        <a-box color="green" 
        position="0 -4 -15" 
        scale="30 30"
        rotation="90 0 0"
        ></a-box>


   <a-box
        scale="50 50"
        color="green"
        rotation="0 0 0"
    ></a-box>

        </a-scene>
    </body>
</html>
