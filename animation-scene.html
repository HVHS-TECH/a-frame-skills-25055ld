<!DOCTYPE html>
<html>
    <head>
        <script src="https://aframe.io/releases/1.0.0/aframe.min.js"></script>
        <title>Radioactive Signals</title>
    </head>
    <body>
        <a-scene>
            <!-- Set the sky -->
            <a-sky color="lightblue"></a-sky>
 
 
            <a-cone color="white" radius-bottom=".5" radius-top="3"
                position="0 2 -15" height="3"
                animation="
                property:
                from: 0 0 90;
                to: 0 180 90;
                "
        ></a-cone>  
        
        <a-box color="green" 
        position="0 -4 -15" 
        scale="30 30"
        rotation="90 0 0"
        ></a-box>


   <a-box
        scale="50 50"
        color="green"
        rotation="0 0 0"
    ></a-box>

<a-torus 
        position="0 0 -15"
        color="blue"
        radius=12
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="green"
        radius=11
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="yellow"
        radius=10
        radius-tubular="0.25"
    ></a-torus>
    <a-torus 
        position="0 0 -15"
        color="red"
        radius=9
        radius-tubular="0.25"
  

        </a-scene>
    </body>
</html>
